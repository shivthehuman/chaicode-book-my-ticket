<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stellar Seat Booking - Protected</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap");

        body {
            font-family: "Outfit", sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }
        .custom-scrollbar::-webkit-scrollbar {
            height: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1e293b;
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
    </style>
</head>

<body
    class="min-h-screen flex items-center justify-center p-4 md:p-6 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900">
    <div
        class="max-w-7xl w-full bg-slate-800/80 backdrop-blur-xl rounded-3xl shadow-2xl p-6 md:p-10 border border-slate-700/50">

        <div id="auth-section"
            class="flex flex-col sm:flex-row justify-center gap-4 mb-8 p-4 bg-slate-900/50 rounded-2xl border border-slate-700">
            <input type="email" id="email" placeholder="Enter Email"
                class="px-4 py-2 rounded-xl bg-slate-800 border border-slate-600 text-white focus:outline-none focus:border-cyan-400 w-full sm:w-auto">
            <input type="password" id="password" placeholder="Enter Password"
                class="px-4 py-2 rounded-xl bg-slate-800 border border-slate-600 text-white focus:outline-none focus:border-cyan-400 w-full sm:w-auto">
            <button onclick="handleLogin()"
                class="px-6 py-2 bg-emerald-500 hover:bg-emerald-400 text-white rounded-xl font-bold transition shadow-[0_0_15px_rgba(16,185,129,0.4)]">Login</button>
            <button onclick="handleRegister()"
                class="px-6 py-2 bg-cyan-500 hover:bg-cyan-400 text-white rounded-xl font-bold transition shadow-[0_0_15px_rgba(34,211,238,0.4)]">Register</button>
        </div>

        <div id="user-section"
            class="hidden flex flex-col sm:flex-row justify-center items-center gap-6 mb-8 p-4 bg-slate-900/50 rounded-2xl border border-emerald-500/30">
            <span class="text-emerald-400 font-bold text-lg">Welcome, VIP User! 🎟️</span>
            <button onclick="handleLogout()"
                class="px-6 py-2 bg-rose-500 hover:bg-rose-400 text-white rounded-xl font-bold transition shadow-[0_0_15px_rgba(244,63,94,0.4)]">Logout</button>
        </div>

        <div class="text-center mb-8 md:mb-10">
            <h1
                class="text-3xl md:text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 mb-4 tracking-tight">
                ChaiCode Cinema - Now Showing<br class="hidden md:block" />
                <span class="text-red-400 mt-2 block"><span class="font-bold">Dhurandhar The Revenge</span></span>
            </h1>
            <p class="text-slate-400 text-base md:text-lg">Protected Booking Enabled 🛡️</p>
        </div>

        <div class="flex justify-center mb-8 md:mb-10">
            <div
                class="bg-slate-900/50 rounded-full px-4 md:px-6 py-2 md:py-3 border border-slate-700 flex gap-4 md:gap-8 items-center text-sm md:text-base">
                <div class="flex items-center gap-2 md:gap-3">
                    <div
                        class="w-3 h-3 md:w-4 md:h-4 rounded-full bg-emerald-500 shadow-[0_0_12px_rgba(16,185,129,0.6)]">
                    </div>
                    <span class="text-slate-300 font-medium tracking-wide">Available</span>
                </div>
                <div class="w-px h-6 bg-slate-700"></div>
                <div class="flex items-center gap-2 md:gap-3">
                    <div class="w-3 h-3 md:w-4 md:h-4 rounded-full bg-rose-500/20 border border-rose-500/50"></div>
                    <span class="text-slate-400 font-medium tracking-wide">Booked</span>
                </div>
            </div>
        </div>

        <div class="flex justify-center">
            <div
                class="bg-slate-900/40 p-4 md:p-8 rounded-2xl border border-slate-700/50 shadow-inner overflow-x-auto w-full custom-scrollbar">
                <table id="tbl" class="border-separate border-spacing-2 md:border-spacing-4 mx-auto"></table>
            </div>
        </div>
    </div>

    <script>
        // --- AUTHENTICATION LOGIC ---
        function checkLoginState() {
            const token = localStorage.getItem("token");
            if (token) {
                document.getElementById("auth-section").classList.add("hidden");
                document.getElementById("user-section").classList.remove("hidden");
                document.getElementById("user-section").classList.add("flex");
            } else {
                document.getElementById("auth-section").classList.remove("hidden");
                document.getElementById("auth-section").classList.add("flex");
                document.getElementById("user-section").classList.add("hidden");
                document.getElementById("user-section").classList.remove("flex");
            }
        }

        async function handleRegister() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            if (!email || !password) return alert("Email and Password required!");

            const res = await fetch("/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (res.ok) alert("Registered successfully! Now please click Login.");
            else alert("Error: " + data.error);
        }

        async function handleLogin() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            if (!email || !password) return alert("Email and Password required!");

            const res = await fetch("/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();

            if (res.ok) {
                localStorage.setItem("token", data.token);
                alert("Login Successful!");
                checkLoginState();
            } else {
                alert("Error: " + data.error);
            }
        }

        function handleLogout() {
            localStorage.removeItem("token");
            checkLoginState();
            alert("Logged out successfully!");
        }

        checkLoginState();

        // --- EXISTING SEAT LOGIC (With Responsive UI Fix) ---
        async function run() {
            const tbl = document.getElementById("tbl");
            const res = await fetch("/seats");
            const resarray = await res.json();
            const j = resarray.sort((a, b) => a.id - b.id);
            let tr;
            for (let i = 0; i < j.length; i++) {
                if (i % 8 === 0) tr = document.createElement("tr");

                const td = document.createElement("td");

                // RESPONSIVE FIX: w-14 h-14 on small screens, md:w-32 md:h-32 on large screens
                const baseClasses = "w-14 h-14 sm:w-20 sm:h-20 md:w-32 md:h-32 rounded-xl md:rounded-2xl text-center align-middle text-lg md:text-2xl font-bold transition-all duration-300 select-none relative group";

                if (j[i].isbooked) {
                    td.className = `${baseClasses} bg-rose-500/10 text-rose-500/60 border border-rose-500/20 cursor-not-allowed`;
                    td.innerHTML = `
              <span class="relative z-10">${j[i].id}</span>
              <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 md:mb-3 px-3 md:px-4 py-1 md:py-2 bg-slate-900 border border-slate-700 text-xs md:text-sm text-slate-300 rounded-lg md:rounded-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 whitespace-nowrap shadow-2xl z-50 pointer-events-none font-normal">
                Booked by: <span class="font-bold text-white ml-1">${j[i].name}</span>
              </div>
            `;
                } else {
                    td.className = `${baseClasses} bg-emerald-500 text-white border-2 border-emerald-400 shadow-[0_0_10px_rgba(16,185,129,0.3)] md:shadow-[0_0_20px_rgba(16,185,129,0.3)] cursor-pointer hover:bg-emerald-400 hover:-translate-y-1 md:hover:-translate-y-1.5 active:scale-95`;
                    td.innerHTML = `<span class="relative z-10">${j[i].id}</span>`;
                }

                td.addEventListener("click", async function (e) {
                    const currentTd = e.currentTarget;
                    if (currentTd.classList.contains("cursor-not-allowed")) return;

                    // GATEKEEPER CHECK: Is token in pocket?
                    const token = localStorage.getItem("token");
                    if (!token) {
                        alert("Bhai! Pehle upar form se Login kar lo seat book karne ke liye!");
                        return;
                    }

                    try {
                        const id = j[i].id;
                        const name = prompt("Enter your name for the ticket:");
                        if (!name) return;

                        // SENDING THE VIP PASS IN HEADERS
                        const res = await fetch(`/${id}/${name}`, {
                            method: "PUT",
                            headers: {
                                "Authorization": `Bearer ${token}`
                            }
                        });
                        const data = await res.json();

                        if (data.error) {
                            alert("FAILED! " + data.error);
                        } else {
                            alert("Booked successfully!");
                            location.reload();
                        }
                    } catch (ex) {
                        alert("error booking " + ex);
                    }
                });
                tr.appendChild(td);
                tbl.appendChild(tr);
            }
        }
        run();
    </script>
</body>

</html>
